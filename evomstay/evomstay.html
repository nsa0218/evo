<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>evomstay — design system</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles/tokens.css"/>
<style>
  @keyframes popIn { from { opacity: 0; transform: translateY(-4px) scale(0.98);} to {opacity: 1; transform: none;} }
  @keyframes draw { to { stroke-dashoffset: 0; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px);} to {opacity: 1; transform: none;} }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0);} 30% { transform: translateY(-3px);} }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/data.jsx"></script>
<script type="text/babel" src="components/chrome.jsx"></script>
<script type="text/babel" src="screens/auth.jsx"></script>
<script type="text/babel" src="screens/landing.jsx"></script>
<script type="text/babel" src="screens/search-detail.jsx"></script>
<script type="text/babel" src="screens/booking-guest-chat.jsx"></script>
<script type="text/babel" src="screens/host.jsx"></script>
<script type="text/babel" src="screens/admin-profile.jsx"></script>
<script type="text/babel" src="screens/mobile.jsx"></script>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "density": "comfortable",
  "glass": "medium"
}/*EDITMODE-END*/;

const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [role, setRole] = React.useState('guest');

  // Apply tweaks to <html>
  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', tweaks.theme);
    const dens = tweaks.density === 'compact' ? 0.85 : tweaks.density === 'spacious' ? 1.15 : 1;
    document.documentElement.style.setProperty('--density', dens);
    const blur = tweaks.glass === 'low' ? '10px' : tweaks.glass === 'high' ? '36px' : '24px';
    document.documentElement.style.setProperty('--glass-blur', blur);
  }, [tweaks]);

  const sharedProps = { role, onRoleChange: setRole };

  return (
    <>
      <DesignCanvas
        title="evomstay — luxury rental platform"
        subtitle="Eviniz gibi, güvenle kalın · 12 surfaces across guest, host, and admin"
      >
        <DCSection id="hero" title="01 · Landing & access">
          <DCArtboard id="landing" label="Landing — desktop" width={1440} height={980}>
            <LandingScreen {...sharedProps}/>
          </DCArtboard>
          <DCArtboard id="login" label="Sign in" width={1280} height={900}>
            <LoginScreen {...sharedProps}/>
          </DCArtboard>
          <DCArtboard id="register" label="Create account — role + verify" width={1280} height={900}>
            <RegisterScreen/>
          </DCArtboard>
        </DCSection>

        <DCSection id="guest" title="02 · Guest journey">
          <DCArtboard id="search" label="Search results + map" width={1440} height={980}>
            <SearchResultsScreen {...sharedProps}/>
          </DCArtboard>
          <DCArtboard id="detail" label="Property detail" width={1280} height={980}>
            <PropertyDetailScreen {...sharedProps}/>
          </DCArtboard>
          <DCArtboard id="booking" label="Booking checkout (multi-step)" width={1080} height={980}>
            <BookingFlowScreen {...sharedProps}/>
          </DCArtboard>
          <DCArtboard id="trips" label="Guest dashboard — trips" width={1280} height={980}>
            <GuestDashboardScreen {...sharedProps}/>
          </DCArtboard>
        </DCSection>

        <DCSection id="comm" title="03 · Communication & trust">
          <DCArtboard id="chat" label="Chat — guest ↔ host" width={1380} height={980}>
            <ChatScreen {...sharedProps}/>
          </DCArtboard>
          <DCArtboard id="profile" label="Profile + reviews · verified host" width={1200} height={980}>
            <ProfileScreen {...sharedProps}/>
          </DCArtboard>
        </DCSection>

        <DCSection id="host" title="04 · Host studio">
          <DCArtboard id="hostd" label="Host dashboard — listings · calendar · analytics" width={1440} height={980}>
            <HostDashboardScreen {...sharedProps}/>
          </DCArtboard>
        </DCSection>

        <DCSection id="admin" title="05 · Technical support · admin">
          <DCArtboard id="adminD" label="Admin · live operations (dark)" width={1500} height={980}>
            <AdminScreen {...sharedProps}/>
          </DCArtboard>
        </DCSection>

        <DCSection id="mobile" title="06 · Mobile">
          <DCArtboard id="mLanding" label="Mobile · Search" width={400} height={800}>
            <div style={{padding: 10}}><MobileLanding/></div>
          </DCArtboard>
          <DCArtboard id="mDetail" label="Mobile · Detail" width={400} height={800}>
            <div style={{padding: 10}}><MobileDetail/></div>
          </DCArtboard>
          <DCArtboard id="mChat" label="Mobile · Chat" width={400} height={800}>
            <div style={{padding: 10}}><MobileChat/></div>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks" defaultOpen={false}>
        <TweakSection title="Appearance">
          <TweakRadio label="Theme" value={tweaks.theme} options={[{label:'Light', value:'light'},{label:'Dark', value:'dark'}]} onChange={(v) => setTweak('theme', v)}/>
          <TweakRadio label="Density" value={tweaks.density} options={[{label:'Compact', value:'compact'},{label:'Comfortable', value:'comfortable'},{label:'Spacious', value:'spacious'}]} onChange={(v) => setTweak('density', v)}/>
          <TweakRadio label="Glassmorphism" value={tweaks.glass} options={[{label:'Low', value:'low'},{label:'Medium', value:'medium'},{label:'High', value:'high'}]} onChange={(v) => setTweak('glass', v)}/>
        </TweakSection>
        <TweakSection title="Tip">
          <div style={{fontSize: 12, color:'var(--slate-500)', lineHeight: 1.5}}>
            Role is chosen during registration. The Sign-in and Create-account artboards live in section 01 alongside the Landing page.
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
