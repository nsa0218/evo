services:
  # ============================================
  # REVERSE PROXY
  # ============================================
  nginx:
    image: nginx:1.25-alpine
    container_name: platform-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health", "||", "exit", "1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================
  # FRONTEND - Next.js
  # ============================================
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: platform-web
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_WS_URL=ws://localhost/ws
      - NEXT_PUBLIC_MEDIA_URL=http://localhost/media
      - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    expose:
      - "3000"
    networks:
      - frontend
    restart: unless-stopped

  # ============================================
  # BACKEND - NestJS Modüler Monolith
  # ============================================
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: platform-api
    env_file: .env
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - backend
      - data
    restart: unless-stopped

  # ============================================
  # BACKGROUND WORKER - BullMQ
  # ============================================
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: platform-worker
    command: ["node", "dist/worker.js"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - data
    restart: unless-stopped

  # ============================================
  # DATABASE - PostgreSQL + PostGIS
  # ============================================
  postgres:
    image: postgis/postgis:16-3.4
    container_name: platform-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-konaklama_db}
      POSTGRES_USER: ${POSTGRES_USER:-platform_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platform_user} -d ${POSTGRES_DB:-konaklama_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data
    restart: unless-stopped

  # ============================================
  # CACHE & PUB/SUB - Redis
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: platform-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me} --appendonly yes
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change_me}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data
    restart: unless-stopped

  # ============================================
  # SEARCH ENGINE - Elasticsearch
  # ============================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: platform-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    expose:
      - "9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 1g
    networks:
      - data
    restart: unless-stopped

  # ============================================
  # OBJECT STORAGE - MinIO (S3-uyumlu)
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: platform-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me}
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    networks:
      - backend
      - data
    restart: unless-stopped

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local
  es_data:
    driver: local
  minio_data:
    driver: local

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  data:
    driver: bridge
